<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">
<title>TC6 Avaliação Funcional</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>

body{
font-family:Segoe UI;
background:#eef3f9;
margin:0;
}

header{
background:linear-gradient(90deg,#0f4c81,#2b8ed6);
color:white;
padding:25px;
font-size:26px;
text-align:center;
font-weight:600;
}

.container{
max-width:1000px;
margin:auto;
padding:20px;
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
}

.card{
background:white;
padding:20px;
border-radius:14px;
box-shadow:0 4px 20px rgba(0,0,0,0.08);
}

input,select{
padding:8px;
margin:6px;
width:90%;
}

button{
background:#2b8ed6;
color:white;
border:none;
padding:12px 20px;
border-radius:10px;
cursor:pointer;
}

#timer{
font-size:60px;
text-align:center;
color:#2b8ed6;
font-weight:700;
}

#voltas{
font-size:40px;
text-align:center;
}

.resultado{
font-size:18px;
line-height:1.6;
}

.modal{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.4);
justify-content:center;
align-items:center;
}

.modal-content{
background:white;
padding:25px;
border-radius:12px;
text-align:center;
}

canvas{
margin-top:15px;
}

</style>

</head>

<body>

<header>
Teste de Caminhada de 6 Minutos
</header>

<div class="container">

<div class="card">

<h3>Paciente</h3>

<input id="nome" placeholder="Nome">

<input id="idade" placeholder="Idade">

<input id="altura" placeholder="Altura (cm)">

<input id="peso" placeholder="Peso (kg)">

<select id="sexo">
<option value="m">Masculino</option>
<option value="f">Feminino</option>
</select>

</div>

<div class="card">

<h3>Cronômetro</h3>

<div id="timer">06:00</div>

<button onclick="iniciar()">Iniciar teste</button>

</div>

<div class="card">

<h3>Voltas</h3>

<div id="voltas">0</div>

<button onclick="addVolta()">+ Volta</button>
<button onclick="removeVolta()">- Volta</button>

</div>

<div class="card">

<h3>Percurso</h3>

<input id="percurso" value="30">

</div>

<div class="card">

<h3>Resultado</h3>

<div id="resultado" class="resultado"></div>

<button onclick="calcular()">Calcular</button>
<button onclick="gerarPDF()">Gerar PDF</button>

</div>

<div class="card">

<h3>Frequência Cardíaca</h3>

<canvas id="graficoFC"></canvas>

</div>

<div class="card">

<h3>Saturação de Oxigênio</h3>

<canvas id="graficoSPO2"></canvas>

</div>

</div>

<div class="modal" id="modal">

<div class="modal-content">

<h3 id="momento"></h3>

<input id="fc" placeholder="Frequência cardíaca">

<input id="spo2" placeholder="SpO2">

<button onclick="salvar()">Salvar</button>

</div>

</div>

<script>

let tempo=360
let cronometro
let voltas=0

let vitais={
inicio:{},
min3:{},
min6:{},
rec1:{},
rec5:{}
}

let fcArray=[null,null,null,null,null]
let spo2Array=[null,null,null,null,null]

let momentoAtual=""

function iniciar(){

abrir("inicio")

cronometro=setInterval(()=>{

tempo--

let min=Math.floor(tempo/60)
let seg=tempo%60

document.getElementById("timer").innerHTML=
String(min).padStart(2,"0")+":"+
String(seg).padStart(2,"0")

if(tempo==180){

abrir("min3")

}

if(tempo==0){

clearInterval(cronometro)

abrir("min6")

setTimeout(()=>abrir("rec1"),60000)

setTimeout(()=>abrir("rec5"),300000)

}

},1000)

}

function abrir(m){

momentoAtual=m

document.getElementById("momento").innerText="Coleta "+m

document.getElementById("modal").style.display="flex"

}

function salvar(){

let fc=document.getElementById("fc").value
let spo2=document.getElementById("spo2").value

vitais[momentoAtual]={fc:fc,spo2:spo2}

if(momentoAtual=="inicio"){fcArray[0]=fc;spo2Array[0]=spo2}
if(momentoAtual=="min3"){fcArray[1]=fc;spo2Array[1]=spo2}
if(momentoAtual=="min6"){fcArray[2]=fc;spo2Array[2]=spo2}
if(momentoAtual=="rec1"){fcArray[3]=fc;spo2Array[3]=spo2}
if(momentoAtual=="rec5"){fcArray[4]=fc;spo2Array[4]=spo2}

document.getElementById("modal").style.display="none"

}

function addVolta(){

voltas++

document.getElementById("voltas").innerText=voltas

}

function removeVolta(){

if(voltas>0){
voltas--
document.getElementById("voltas").innerText=voltas
}

}

function calcular(){

let percurso=document.getElementById("percurso").value

let distancia=voltas*percurso

let idade=document.getElementById("idade").value
let altura=document.getElementById("altura").value
let peso=document.getElementById("peso").value
let sexo=document.getElementById("sexo").value

let previsto

if(sexo=="m"){

previsto=(7.57*altura)-(5.02*idade)-(1.76*peso)-309

}else{

previsto=(2.11*altura)-(2.29*peso)-(5.78*idade)+667

}

let percentual=(distancia/previsto)*100

document.getElementById("resultado").innerHTML=

"Distância: "+distancia+" m <br>"+
"Previsto: "+Math.round(previsto)+" m <br>"+
"Capacidade funcional: "+Math.round(percentual)+" %"

gerarGraficos()

}

function gerarGraficos(){

new Chart(document.getElementById("graficoFC"),{

type:"line",

data:{
labels:["Inicio","3 min","6 min","1 min","5 min"],
datasets:[{
label:"FC",
data:fcArray
}]
}

})

new Chart(document.getElementById("graficoSPO2"),{

type:"line",

data:{
labels:["Inicio","3 min","6 min","1 min","5 min"],
datasets:[{
label:"SpO2",
data:spo2Array
}]
}

})

}

function gerarPDF(){

const { jsPDF } = window.jspdf

let doc=new jsPDF()

let nome=document.getElementById("nome").value
let data=new Date().toLocaleDateString()

doc.text("Relatório TC6",20,20)

doc.text("Paciente: "+nome,20,35)
doc.text("Data: "+data,20,45)

doc.text("Sinais Vitais",20,60)

doc.text("FC início "+vitais.inicio.fc,20,70)
doc.text("FC 3 min "+vitais.min3.fc,20,80)
doc.text("FC 6 min "+vitais.min6.fc,20,90)
doc.text("FC 1 min "+vitais.rec1.fc,20,100)
doc.text("FC 5 min "+vitais.rec5.fc,20,110)

doc.text("SpO2 início "+vitais.inicio.spo2,20,130)
doc.text("SpO2 3 min "+vitais.min3.spo2,20,140)
doc.text("SpO2 6 min "+vitais.min6.spo2,20,150)
doc.text("SpO2 1 min "+vitais.rec1.spo2,20,160)
doc.text("SpO2 5 min "+vitais.rec5.spo2,20,170)

let graficoFC=document.getElementById("graficoFC")
let imgFC=graficoFC.toDataURL("image/png")

doc.addPage()

doc.addImage(imgFC,"PNG",20,20,170,90)

let graficoSPO2=document.getElementById("graficoSPO2")
let imgSPO2=graficoSPO2.toDataURL("image/png")

doc.addPage()

doc.addImage(imgSPO2,"PNG",20,20,170,90)

doc.save("relatorio_TC6.pdf")

}

</script>

</body>
</html>
