<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">

<title>TC6 Avaliação Funcional</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>

body{
font-family:Segoe UI;
background:#F3F4F6;
margin:0;
}

header{
background:#7A1E2C;
color:white;
padding:20px;
font-size:26px;
font-weight:600;
display:flex;
justify-content:space-between;
align-items:center;
}

header span{
font-size:14px;
opacity:0.8;
}

.container{
max-width:1200px;
margin:auto;
padding:25px;
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
}

.card{

background:white;
border-radius:12px;
padding:20px;
box-shadow:0 3px 15px rgba(0,0,0,0.08);

}

h3{
margin-top:0;
color:#7A1E2C;
}

input,select{

width:100%;
padding:10px;
margin-top:6px;
margin-bottom:10px;
border-radius:8px;
border:1px solid #ddd;

}

button{

background:#7A1E2C;
color:white;
border:none;
padding:12px;
border-radius:10px;
cursor:pointer;
margin-top:10px;
width:100%;

}

button:hover{
background:#B23A48;
}

#timer{
font-size:60px;
text-align:center;
font-weight:700;
color:#7A1E2C;
}

#voltas{

font-size:40px;
text-align:center;
color:#7A1E2C;

}

.badge{

padding:10px;
border-radius:8px;
color:white;
text-align:center;
margin-top:10px;

}

.verde{background:#2e7d32}
.amarelo{background:#f9a825}
.vermelho{background:#c62828}

.modal{

display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.5);
justify-content:center;
align-items:center;

}

.modal-content{

background:white;
padding:30px;
border-radius:12px;
width:300px;

}

</style>

</head>

<body>

<header>

<div>🏥 Sistema TC6</div>

<span>Avaliação Funcional</span>

</header>

<div class="container">

<div class="card">

<h3>👤 Dados do Paciente</h3>

<input id="nome" placeholder="Nome">

<input id="idade" placeholder="Idade">

<input id="altura" placeholder="Altura (cm)">

<input id="peso" placeholder="Peso (kg)">

<select id="sexo">

<option value="m">Masculino</option>
<option value="f">Feminino</option>

</select>

</div>

<div class="card">

<h3>⏱ Cronômetro</h3>

<div id="timer">06:00</div>

<button onclick="iniciar()">Iniciar Teste</button>

</div>

<div class="card">

<h3>🔄 Voltas</h3>

<div id="voltas">0</div>

<button onclick="addVolta()">Adicionar volta</button>

</div>

<div class="card">

<h3>📏 Percurso</h3>

<input id="percurso" value="30">

</div>

<div class="card">

<h3>📊 Resultado</h3>

<div id="resultado"></div>

<div id="classe"></div>

<button onclick="calcular()">Calcular Resultado</button>

<button onclick="gerarPDF()">Gerar PDF</button>

<button onclick="compartilharWhats()">Compartilhar WhatsApp</button>

</div>

<div class="card">

<h3>📈 Frequência Cardíaca</h3>

<canvas id="graficoFC"></canvas>

</div>

<div class="card">

<h3>🫁 Saturação</h3>

<canvas id="graficoSPO2"></canvas>

</div>

</div>

<div class="modal" id="modal">

<div class="modal-content">

<h3 id="momento"></h3>

<input id="fc" placeholder="FC">

<input id="spo2" placeholder="SpO2">

<input id="borgD" placeholder="Borg Dispneia">

<input id="borgF" placeholder="Borg Fadiga">

<button onclick="salvar()">Salvar</button>

</div>

</div>

<script>

let tempo=360
let cronometro

let voltas=0

let fc=[null,null,null,null,null]
let spo2=[null,null,null,null,null]

let vitais={
inicio:{},min3:{},min6:{},rec1:{},rec5:{}
}

let momentoAtual=""

function iniciar(){

abrir("inicio")

cronometro=setInterval(()=>{

tempo--

let min=Math.floor(tempo/60)
let seg=tempo%60

document.getElementById("timer").innerHTML=
String(min).padStart(2,"0")+":"+String(seg).padStart(2,"0")

if(tempo==180) abrir("min3")

if(tempo==0){

clearInterval(cronometro)

abrir("min6")

setTimeout(()=>abrir("rec1"),60000)

setTimeout(()=>abrir("rec5"),300000)

}

},1000)

}

function abrir(m){

momentoAtual=m

document.getElementById("momento").innerText="Coleta "+m

document.getElementById("modal").style.display="flex"

}

function salvar(){

let f=document.getElementById("fc").value
let s=document.getElementById("spo2").value
let bd=document.getElementById("borgD").value
let bf=document.getElementById("borgF").value

vitais[momentoAtual]={fc:f,spo2:s,borgD:bd,borgF:bf}

if(momentoAtual=="inicio"){fc[0]=f;spo2[0]=s}
if(momentoAtual=="min3"){fc[1]=f;spo2[1]=s}
if(momentoAtual=="min6"){fc[2]=f;spo2[2]=s}
if(momentoAtual=="rec1"){fc[3]=f;spo2[3]=s}
if(momentoAtual=="rec5"){fc[4]=f;spo2[4]=s}

document.getElementById("modal").style.display="none"

}

function addVolta(){

voltas++

document.getElementById("voltas").innerText=voltas

}

function calcular(){

let percurso=document.getElementById("percurso").value

let distancia=voltas*percurso

let idade=document.getElementById("idade").value
let altura=document.getElementById("altura").value
let peso=document.getElementById("peso").value
let sexo=document.getElementById("sexo").value

let previsto

if(sexo=="m"){

previsto=(7.57*altura)-(5.02*idade)-(1.76*peso)-309

}else{

previsto=(2.11*altura)-(2.29*peso)-(5.78*idade)+667

}

let percentual=(distancia/previsto)*100

document.getElementById("resultado").innerHTML=

"Distância: "+distancia+" m<br>"+
"Previsto: "+Math.round(previsto)+" m<br>"+
"Capacidade: "+Math.round(percentual)+" %"

let classe=""

if(percentual>=80){

classe='<div class="badge verde">Capacidade funcional preservada</div>'

}

else if(percentual>=60){

classe='<div class="badge amarelo">Capacidade moderada</div>'

}

else{

classe='<div class="badge vermelho">Capacidade reduzida</div>'

}

document.getElementById("classe").innerHTML=classe

gerarGraficos()

}

function gerarGraficos(){

new Chart(document.getElementById("graficoFC"),{

type:"line",

data:{
labels:["Inicio","3 min","6 min","1 min","5 min"],
datasets:[{label:"FC",data:fc}]
}

})

new Chart(document.getElementById("graficoSPO2"),{

type:"line",

data:{
labels:["Inicio","3 min","6 min","1 min","5 min"],
datasets:[{label:"SpO2",data:spo2}]
}

})

}

function gerarPDF(){

const { jsPDF } = window.jspdf

let doc=new jsPDF()

let nome=document.getElementById("nome").value

doc.text("Relatório TC6",20,20)

doc.text("Paciente: "+nome,20,40)

doc.save("TC6.pdf")

}

function compartilharWhats(){

let nome=document.getElementById("nome").value

let texto="Resultado TC6 do paciente "+nome

let url="https://wa.me/?text="+encodeURIComponent(texto)

window.open(url)

}

</script>

</body>

</html>
