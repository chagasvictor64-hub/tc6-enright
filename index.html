<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">
<title>TC6 Avaliação Clínica</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>

body{
font-family:Arial;
background:#eef3f8;
margin:0;
}

header{
background:#0b3d91;
color:white;
text-align:center;
padding:20px;
font-size:22px;
}

.container{
max-width:900px;
margin:auto;
padding:20px;
}

.card{
background:white;
padding:20px;
border-radius:10px;
margin-bottom:20px;
box-shadow:0 0 10px rgba(0,0,0,0.08);
}

input{
padding:8px;
margin:5px;
}

button{
padding:10px 18px;
border:none;
border-radius:8px;
background:#0b3d91;
color:white;
cursor:pointer;
}

#timer{
font-size:50px;
text-align:center;
color:#0b3d91;
}

#voltas{
font-size:30px;
text-align:center;
margin:10px;
}

.modal{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.5);
justify-content:center;
align-items:center;
}

.modal-content{
background:white;
padding:20px;
border-radius:10px;
text-align:center;
}

canvas{
margin-top:20px;
}

</style>

</head>

<body>

<header>
Teste de Caminhada de 6 Minutos
</header>

<div class="container">

<div class="card">

<h3>Dados do Paciente</h3>

<input id="nome" placeholder="Nome"><br>
<input id="idade" placeholder="Idade"><br>
<input id="altura" placeholder="Altura cm"><br>
<input id="peso" placeholder="Peso kg"><br>

<select id="sexo">
<option value="m">Masculino</option>
<option value="f">Feminino</option>
</select>

</div>

<div class="card">

<h3>Cronômetro</h3>

<div id="timer">06:00</div>

<button onclick="iniciar()">Iniciar teste</button>

</div>

<div class="card">

<h3>Voltas</h3>

<div id="voltas">0</div>

<button onclick="addVolta()">+ Volta</button>
<button onclick="removeVolta()">- Volta</button>

</div>

<div class="card">

Comprimento do percurso (m)

<input id="percurso" value="30">

</div>

<div class="card">

<button onclick="calcular()">Calcular resultado</button>

<div id="resultado"></div>

<button onclick="gerarPDF()">Gerar relatório PDF</button>

</div>

<div class="card">

<h3>Gráfico Frequência Cardíaca</h3>

<canvas id="graficoFC"></canvas>

</div>

<div class="card">

<h3>Gráfico SpO2</h3>

<canvas id="graficoSPO2"></canvas>

</div>

</div>

<div class="modal" id="modalVitals">

<div class="modal-content">

<h3 id="momento"></h3>

<input id="fc" placeholder="FC"><br>
<input id="spo2" placeholder="SpO2"><br>
<input id="borgD" placeholder="Borg dispneia"><br>
<input id="borgF" placeholder="Borg fadiga"><br>

<button onclick="salvarVitals()">Salvar</button>

</div>

</div>

<script>

let tempo=360
let cronometro
let voltas=0

let distancia=0
let previsto=0
let percentual=0

let momentoAtual=""

let vitais={
inicio:{},
min3:{},
min6:{},
rec1:{},
rec5:{}
}

let fcArray=[]
let spo2Array=[]

function iniciar(){

abrirModal("inicio")

cronometro=setInterval(()=>{

tempo--

let min=Math.floor(tempo/60)
let seg=tempo%60

document.getElementById("timer").innerHTML=
String(min).padStart(2,"0")+":"+
String(seg).padStart(2,"0")

if(tempo==180){

abrirModal("min3")

}

if(tempo==0){

clearInterval(cronometro)

abrirModal("min6")

iniciarRecuperacao()

}

},1000)

}

function iniciarRecuperacao(){

setTimeout(()=>{

abrirModal("rec1")

},60000)

setTimeout(()=>{

abrirModal("rec5")

},300000)

}

function abrirModal(m){

momentoAtual=m

document.getElementById("momento").innerText="Coleta: "+m

document.getElementById("modalVitals").style.display="flex"

}

function salvarVitals(){

let fc=document.getElementById("fc").value
let spo2=document.getElementById("spo2").value

vitais[momentoAtual]={fc:fc,spo2:spo2}

fcArray.push(fc)
spo2Array.push(spo2)

document.getElementById("modalVitals").style.display="none"

}

function addVolta(){

voltas++
document.getElementById("voltas").innerHTML=voltas

}

function removeVolta(){

if(voltas>0){
voltas--
document.getElementById("voltas").innerHTML=voltas
}

}

function calcular(){

let percurso=Number(document.getElementById("percurso").value)

distancia=voltas*percurso

let idade=Number(document.getElementById("idade").value)
let altura=Number(document.getElementById("altura").value)
let peso=Number(document.getElementById("peso").value)
let sexo=document.getElementById("sexo").value

if(sexo=="m"){

previsto=(7.57*altura)-(5.02*idade)-(1.76*peso)-309

}else{

previsto=(2.11*altura)-(2.29*peso)-(5.78*idade)+667

}

percentual=(distancia/previsto)*100

document.getElementById("resultado").innerHTML=

"Distância: "+distancia+" m <br>"+
"Previsto: "+Math.round(previsto)+" m <br>"+
"Capacidade funcional: "+Math.round(percentual)+" %"

gerarGraficos()

}

function gerarGraficos(){

new Chart(document.getElementById("graficoFC"),{

type:"line",

data:{
labels:["Inicio","3min","6min","1min","5min"],
datasets:[{
label:"Frequência Cardíaca",
data:fcArray
}]
}

})

new Chart(document.getElementById("graficoSPO2"),{

type:"line",

data:{
labels:["Inicio","3min","6min","1min","5min"],
datasets:[{
label:"SpO2",
data:spo2Array
}]
}

})

}

function gerarPDF(){

const { jsPDF } = window.jspdf

let doc=new jsPDF()

let nome=document.getElementById("nome").value
let data=new Date().toLocaleDateString()

doc.setFontSize(18)
doc.text("Relatório TC6",20,20)

doc.setFontSize(12)

doc.text("Paciente: "+nome,20,35)
doc.text("Data: "+data,20,45)

doc.text("Distância: "+distancia+" m",20,60)
doc.text("Previsto: "+Math.round(previsto)+" m",20,70)
doc.text("Capacidade funcional: "+Math.round(percentual)+" %",20,80)

doc.text("FC início: "+vitais.inicio.fc,20,100)
doc.text("FC 3 min: "+vitais.min3.fc,20,110)
doc.text("FC 6 min: "+vitais.min6.fc,20,120)

doc.text("SpO2 início: "+vitais.inicio.spo2,20,140)
doc.text("SpO2 3 min: "+vitais.min3.spo2,20,150)
doc.text("SpO2 6 min: "+vitais.min6.spo2,20,160)

doc.addPage()

doc.text("Gráfico Frequência Cardíaca",20,20)

let graficoFC=document.getElementById("graficoFC")
let imgFC=graficoFC.toDataURL("image/png")

doc.addImage(imgFC,"PNG",20,30,170,80)

doc.addPage()

doc.text("Gráfico SpO2",20,20)

let graficoSPO2=document.getElementById("graficoSPO2")
let imgSPO2=graficoSPO2.toDataURL("image/png")

doc.addImage(imgSPO2,"PNG",20,30,170,80)

doc.save("Relatorio_TC6.pdf")

}

</script>

</body>
</html>
